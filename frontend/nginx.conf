server {
    listen 80;

    # Proxy backend API calls so the SPA can use a relative /api/... base.
    # Without this, when VITE_BACKEND_URL is unset at build time (e.g. .env is
    # excluded by .dockerignore), getApiBase() returns "" and /api/v1/... falls
    # through to the SPA's index.html — the response is HTML and the frontend
    # blows up with "Unexpected token '<' is not valid JSON".
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
