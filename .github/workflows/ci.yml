name: Pre-commit CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Run tests
        run: pytest tests/ -v

  contract-tests:
    name: Contract Tests (OpenAPI + Schemathesis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --group dev
      - name: Schema drift detection
        env:
          SUPABASE_URL: http://placeholder.supabase.co
          SUPABASE_KEY: placeholder-anon-key
          SECRET_KEY: placeholder-secret-for-schema-export
        run: |
          uv run python scripts/export_schema.py
          git diff --exit-code openapi.json || (echo "ERROR: openapi.json is out of date. Run: cd backend && uv run python scripts/export_schema.py && git add openapi.json" && exit 1)
      - name: Run contract tests
        env:
          SUPABASE_URL: http://placeholder.supabase.co
          SUPABASE_KEY: placeholder-anon-key
          SECRET_KEY: placeholder-secret-for-schema-export
        run: uv run pytest tests/contract/ -m contract -v

  type-checks:
    name: Type Checks (mypy + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend: mypy --strict on security-critical modules ──────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install backend dev dependencies
        working-directory: backend
        run: uv sync --group dev
      - name: mypy (strict, scoped to typed modules)
        working-directory: backend
        env:
          SUPABASE_URL: http://placeholder.supabase.co
          SUPABASE_KEY: placeholder-anon-key
          SECRET_KEY: placeholder-secret-for-schema-export
        run: uv run mypy --config-file mypy.ini

      # ── Convention tests (cache keys, datetime, print, scope) ────────────
      - name: Convention gate (pytest -m not integration and not contract)
        working-directory: backend
        env:
          SUPABASE_URL: http://placeholder.supabase.co
          SUPABASE_KEY: placeholder-anon-key
          SECRET_KEY: placeholder-secret-for-schema-export
        run: uv run pytest tests/test_conventions.py -v

      # ── Frontend: TypeScript strict mode ─────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: tsc --noEmit (strict)
        working-directory: frontend
        run: npx tsc --noEmit

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build frontend (needed for preview server in CI)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_BACKEND_URL: http://localhost:8000
      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install JS deps (root)
        run: npm ci

      - name: Install JS deps (frontend)
        run: npm ci
        working-directory: frontend

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --show-diff-on-failure
