[mypy]
python_version = 3.11
strict = True
explicit_package_bases = True
# Progressively typed — start with the three modules that own security decisions.
# Expand files= as the rest of the codebase catches up.
files =
    app/models/identifiers.py,
    app/models/auth.py,
    app/models/dashboard.py,
    app/core/tenant_scope.py,
    app/core/cache_keys.py,
    app/core/structured_logging.py,
    app/services/cache.py,
    app/services/reservations.py,
    app/api/v1/dashboard.py,
    app/api/v1/properties.py

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-supabase.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-zoneinfo.*]
ignore_missing_imports = True

[mypy-app.database]
ignore_errors = True

[mypy-app.database_v2]
ignore_errors = True

[mypy-app.config]
ignore_errors = True

# Legacy core modules — not yet progressively typed
[mypy-app.core.auth]
ignore_errors = True

[mypy-app.core.tenant_resolver]
ignore_errors = True

[mypy-app.core.token_service]
ignore_errors = True

[mypy-app.core.circuit_breaker_fallback]
ignore_errors = True

[mypy-app.core.redis_client]
ignore_errors = True

[mypy-app.core.redis_cache]
ignore_errors = True

[mypy-app.core.supabase_connection_pool]
ignore_errors = True

[mypy-app.core.persistent_sessions]
ignore_errors = True

[mypy-app.core.token_encryption]
ignore_errors = True

[mypy-app.core.token_access]
ignore_errors = True

[mypy-app.core.token_access_auto]
ignore_errors = True

[mypy-app.core.tenant_context]
ignore_errors = True

[mypy-app.core.tenant_cache]
ignore_errors = True

[mypy-app.core.entitlements]
ignore_errors = True

[mypy-app.core.async_supabase]
ignore_errors = True

[mypy-app.core.async_processing]
ignore_errors = True

[mypy-app.core.email_client]
ignore_errors = True

[mypy-app.core.storage]
ignore_errors = True
